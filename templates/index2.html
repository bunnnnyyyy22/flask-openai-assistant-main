<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI App with OpenAI API</title>
</head>

<div style="
  position: relative; 
  width: 100%; 
  max-width: 500px; 
  padding: 30px; 
  /* 這裡改用 Flask 的 url_for 語法來引用靜態資料夾裡的兔子圖片 */
  background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('{{ url_for('static', filename='imgs/rabbit.jpg') }}'); 
  background-size: cover; 
  background-position: center; 
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* 幫卡片加點淡淡的陰影，質感會更好 */
">
  <h3 style="color: #333; font-weight: bold; margin-bottom: 10px;">AI App with OpenAI API</h3>
  <p style="color: #555; line-height: 1.6;">Rabbit!</p>
</div>

<body data-new-gr-c-s-loaded="14.1229.0" spellcheck="false">
    <form action="/generate" method="post" style="text-align: center;">
        <ul>
            <li style="text-align: center;"><span style="font-size: 48px;">Hi there 👋<br>How can I help you today?</span></li>
        </ul><textarea name="prompt" placeholder="Enter your prompt" class="fr-rounded fr-large" style="height: 194px; width: 870px;"></textarea>
        <p style="text-align: center;"><button type="submit">Generate</button></p>
    </form>
    <p><br></p>
    <p>{% if response %}</p>
      <textarea name="response" placeholder="Response"  {{ response }} class="fr-rounded fr-large" style="height: 194px; width: 870px;"></textarea>
    <p>{% endif %}</p>
</body>

</html>
