<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI App with OpenAI API</title>
</head>

<div style="
  position: relative; 
  width: 100%; 
  max-width: 650px; 
  aspect-ratio: 16 / 9; /* 🌟 強制卡片比例與照片一致，照片就不會被裁剪了！ */
  padding: 40px; 
  background-image: linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.5)), url('{{ url_for('static', filename='imgs/dong.jpg') }}'); 
  background-size: cover; /* 配合比例，這裡依然用 cover 但因為比例對了，所以不會被裁切 */
  background-position: center; 
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  justify-content: flex-end; /* 🌟 把文字移到左下角，這樣比較不會擋到 Dong-dong 帥氣的臉 */
">
  <h3 style="color: #000; font-weight: bold; margin-bottom: 8px; text-shadow: 1px 1px 2px rgba(255,255,255,0.8);">His name is Dong-dong.</h3>
  <p style="color: #111; font-weight: bold; text-shadow: 1px 1px 2px rgba(255,255,255,0.8);">OuO</p>
</div>

<body data-new-gr-c-s-loaded="14.1229.0" spellcheck="false">
    <form action="/generate" method="post" style="text-align: center;">
        <ul>
            <li style="text-align: center;"><span style="font-size: 48px;">Hi there 👋<br>How can I help you today?</span></li>
        </ul><textarea name="prompt" placeholder="Enter your prompt" class="fr-rounded fr-large" style="height: 194px; width: 870px;"></textarea>
        <p style="text-align: center;"><button type="submit">Generate</button></p>
    </form>
    <p><br></p>
    <p>{% if response %}</p>
      <textarea name="response" placeholder="Response"  {{ response }} class="fr-rounded fr-large" style="height: 194px; width: 870px;"></textarea>
    <p>{% endif %}</p>
</body>

</html>
